# Tc scenario simulation — Tax critical (constant carbon tax at 0.6e-4)
# Carbon tax revenue goes to government budget.

master_seed: 42

global: ../global/default.yaml

nations:
  - id: global
    config: ../nations/baseline.yaml
    policy:
      - type: CarbonTax
        schedule: constant
        base_rate: 0.6e-4
        tax_on: true

trade:
  enabled: false

climate:
  shared: true
