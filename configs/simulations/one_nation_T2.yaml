# T2 scenario simulation — Tax doubled (constant carbon tax at 3.3e-4)
# Carbon tax revenue goes to government budget.
# C++ Makefile: SFLAGS_T2 = -DTAX_RATE=3.3e-4 -DTAX_ON=1 -DTCO2_1=1.0 -DTCO2_2=0.0 -DTCO2_3=0.0 -DTCO2_4=0.0

master_seed: 42

global: ../global/default.yaml

nations:
  - id: global
    config: ../nations/baseline.yaml
    policy:
      - type: CarbonTax
        schedule: constant
        base_rate: 3.3e-4
        tax_on: true
        revenue_use: [1.0, 0.0, 0.0, 0.0]

trade:
  enabled: false

climate:
  shared: true
